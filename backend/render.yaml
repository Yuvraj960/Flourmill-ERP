# render.yaml
# Infrastructure as Code configuration for Render.com

services:
  # -------------------------------------
  # 1. Main API web service
  # -------------------------------------
  - type: web
    name: millstream-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate"
    startCommand: "npm run start"
    healthCheckPath: "/api/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  # -------------------------------------
  # 2. Background worker service
  # -------------------------------------
  - type: worker
    name: millstream-worker
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate"
    startCommand: "bash scripts/start-worker.sh"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
